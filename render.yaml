# Render Blueprint. On render.com: New → Blueprint → pick this repo → Apply.
# Deploys with zero config (uses a local SQLite DB out of the box).
# For a PERSISTENT database, add an env var in the Render dashboard:
#   ConnectionStrings__Nomos = <your Supabase session-pooler connection string>
services:
  - type: web
    name: nomos
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
