name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Nomos.slnx

      - name: Build
        run: dotnet build Nomos.slnx --no-restore -c Release

      - name: Test
        run: dotnet test Nomos.Tests/Nomos.Tests.csproj --no-build -c Release
