<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PLUTO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💠</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a84ff">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="bootLoader" class="boot-loader">
    <span class="boot-spinner"></span>
    <p id="bootMsg" class="boot-msg" data-i18n="loading">Cargando…</p>
  </div>

  <header class="topbar">
    <button id="profileBtn" class="icon-btn avatar-btn hidden" data-i18n-title="profile" title="Perfil"></button>
    <span class="brand">P&thinsp;L&thinsp;U&thinsp;T&thinsp;O</span>
    <button id="themeBtn" class="icon-btn" data-i18n-title="theme_toggle" title="Cambiar tema">🌙</button>
  </header>

  <!-- ===== Vista Gastos ===== -->
  <main id="view-gastos" class="view">
    <section class="hero">
      <p class="hero-label"><span data-i18n="balance_label">Saldo disponible</span></p>
      <h1 class="hero-amount" id="gBalance">&nbsp;</h1>
      <div class="hero-accounts hidden" id="gBalanceAccounts"></div>
      <p class="hero-sub" id="gMonthSummary"></p>
    </section>

    <div class="grid">
      <div class="col">
        <section class="card">
          <div class="card-head">
            <h3 data-i18n="evolution">Evolución</h3>
            <div class="pills">
              <button class="pill active" data-days="30">30d</button>
              <button class="pill" data-days="90">90d</button>
            </div>
          </div>
          <div id="gChart" class="chart"></div>
        </section>

        <section class="card">
          <h3 data-i18n="category_breakdown">Por categoría</h3>
          <div class="cat-accounts hidden" id="gCatAccounts"></div>
          <div class="cat-wrap">
            <div id="gDonut" class="donut"></div>
            <ul id="gCatList" class="cat-list"></ul>
          </div>
        </section>
      </div>

      <div class="col">
        <section class="card">
          <div class="card-head">
            <h3 data-i18n="recent">Recientes</h3>
            <button id="verTodoBtn" class="link" data-i18n="see_all">Ver todo</button>
          </div>
          <ul id="gRecent" class="tx-list"></ul>
        </section>
      </div>
    </div>
  </main>

  <!-- ===== Vista Patrimonio ===== -->
  <main id="view-patrimonio" class="view hidden">
    <section class="nw-hero">
      <p class="eyebrow" data-i18n="net_worth">Patrimonio neto</p>
      <h1 class="hero-amount" id="nwTotal">&nbsp;</h1>
      <p class="hero-delta" id="nwDelta"></p>
    </section>

    <div class="two-cards">
      <section class="card"><p class="muted-label" data-i18n="assets">Activos</p><p id="nwAssets" class="big-figure green"></p></section>
      <section class="card"><p class="muted-label" data-i18n="liabilities">Pasivos</p><p id="nwLiab" class="big-figure red"></p></section>
    </div>

    <section class="card">
      <h3 data-i18n="annual_evolution">Evolución anual</h3>
      <div id="nwChart" class="chart"></div>
    </section>

    <div id="nwSections"></div>
  </main>

  <!-- ===== Vista Viajes (opt-in desde el perfil) ===== -->
  <main id="view-viajes" class="view hidden">
    <section class="nw-hero">
      <p class="eyebrow" data-i18n="tab_viajes">Viajes</p>
    </section>
    <div id="tripsList"></div>
  </main>

  <button id="fab" class="hidden" data-i18n-title="add" title="Añadir">+</button>

  <nav class="tabbar">
    <button class="tab active" data-view="gastos">💸 <span data-i18n="tab_gastos">Gastos</span></button>
    <button class="tab" data-view="patrimonio">📊 <span data-i18n="tab_patrimonio">Patrimonio</span></button>
    <button class="tab hidden" data-view="viajes" id="tabViajes">✈️ <span data-i18n="tab_viajes">Viajes</span></button>
  </nav>

  <!-- ===== Hoja modal (movimientos / cuentas / perfil / ver todo) ===== -->
  <div id="sheet" class="sheet hidden">
    <div class="sheet-bar">
      <button id="sheetCancel" class="link" data-i18n="cancel">Cancelar</button>
      <span id="sheetTitle" class="sheet-title"></span>
      <button id="sheetSave" class="link save" data-i18n="save" disabled>Guardar</button>
    </div>
    <div id="sheetBody" class="sheet-body"></div>
  </div>

  <!-- ===== Pantalla de acceso ===== -->
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <p class="auth-brand">P&thinsp;L&thinsp;U&thinsp;T&thinsp;O</p>
      <h2 id="authTitle" class="auth-title">Iniciar sesión</h2>

      <label id="authPhotoPick" class="avatar-pick hidden" for="authPhotoInput" data-i18n-title="choose_photo" title="Elegir foto de perfil">📷</label>
      <input id="authPhotoInput" type="file" accept="image/*" hidden>

      <input id="authUser" class="text-field" data-i18n-ph="username_ph" placeholder="Nombre de usuario" maxlength="30" autocomplete="username">
      <input id="authPass" class="text-field" type="password" data-i18n-ph="password_ph" placeholder="Contraseña" maxlength="128" autocomplete="current-password">
      <input id="authPass2" class="text-field hidden" type="password" data-i18n-ph="repeat_password_ph" placeholder="Repite la contraseña" maxlength="128" autocomplete="new-password">

      <p id="authError" class="auth-error"></p>
      <button id="authSubmit" class="primary-btn">Entrar</button>
      <button id="authToggle" class="link auth-toggle">¿No tienes cuenta? Regístrate</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script>
  // DIAGNOSTICO TEMPORAL: solo con ?debug en la URL. Mide el viewport para entender el "zoom"
  // por dispositivo (S22 Ultra vs S25+). Quitar tras el diagnostico.
  if (location.search.indexOf('debug') >= 0) {
    var vd = document.createElement('div');
    vd.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#000;color:#0f0;'
      + 'font:12px/1.45 monospace;padding:4px 6px;pointer-events:none;text-align:center';
    var upd = function () {
      var v = window.visualViewport;
      vd.textContent = 'inner ' + window.innerWidth + 'x' + window.innerHeight
        + ' | screen ' + screen.width + 'x' + screen.height
        + ' | dpr ' + window.devicePixelRatio
        + (v ? ' | vv ' + Math.round(v.width) + 'x' + Math.round(v.height) + ' @' + v.scale.toFixed(2) : '');
    };
    upd();
    document.body.appendChild(vd);
    window.addEventListener('resize', upd);
    if (window.visualViewport) { visualViewport.addEventListener('resize', upd); visualViewport.addEventListener('scroll', upd); }
  }
  </script>

  <!-- app.js troceado en módulos por concern; orden de carga: helpers primero, arranque al final -->
  <script src="js/i18n.js"></script>
  <script src="js/format.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/net.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/state.js"></script>
  <script src="js/views.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/trips.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
